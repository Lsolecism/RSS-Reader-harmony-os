<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS展示</title>
    <style>
        /* 移动端全局样式 */
        .show-container {
            width: 100vw;
            min-height: 100vh;
            background-color: var(--background-color);
            overflow-x: hidden;
        }

        .content-wrapper {
            width: 100%;
            padding: 10px;
            margin: 0;
            line-height: 1.6;
            font-size: 16px;
            color: var(--text-color);
            box-sizing: border-box;
        }

        /* 标题样式 */
        .show-container h1 {
            font-size: 24px;
            margin-top: 30px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-color);
            color: var(--text-color);
            word-break: break-word;
        }

        .show-container h2 {
            font-size: 20px;
            margin: 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--primary-color);
            color: var(--text-color);
            word-break: break-word;
        }

        .show-container h3 {
            font-size: 18px;
            margin: 10px 0;
            color: var(--text-color);
            word-break: break-word;
        }

        /* 图片样式 */
        .show-container img {
            width: calc(100% - 20px) !important;
            height: auto !important;
            border-radius: 6px;
            margin: 10px auto;
            display: block;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* 段落样式 */
        .show-container p {
            margin: 10px 0;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-color);
            word-break: break-word;
        }

        /* 链接样式 */
        .show-container a {
            color: var(--link-color);
            text-decoration: none;
            padding: 2px 0;
            word-break: break-all;
            display: inline-block;
        }

        /* 列表样式 */
        .show-container ul {
            padding-left: 1.2em;
            margin: 10px 0;
            list-style-type: none;
        }

        .show-container li {
            margin: 6px 0;
            font-size: 16px;
            color: var(--text-color);
            line-height: 1.6;
            position: relative;
        }

        .show-container li::before {
            content: "•";
            color: var(--primary-color);
            position: absolute;
            left: -1em;
        }

        /* 代码块样式 */
        .show-container pre {
            background: var(--background-color);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        /* 表格样式 */
        .show-container table {
            width: 100%;
            overflow-x: auto;
            display: block;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 14px;
        }

        .show-container td,
        .show-container th {
            padding: 8px;
            border: 1px solid var(--border);
        }

        /* 返回按钮区域 */
        .back-section {
            margin: 15px 0;
            text-align: center;
            padding: 0 10px;
        }

        /* 作者信息和描述 */
        .show-container .article-info {
            font-size: 16px;
            color: var(--text-color);
            margin: 10px 0;
            line-height: 1.6;
        }

        /* 触摸优化 */
        .show-container a,
        .show-container button {
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
        }
    </style>
</head>
<body>
<div id="article-content" class="show-container">
    <div class="content-wrapper">
    </div>
</div>
</body>
<script>
    function injectHtmlContent() {
        let htmlContent = RSSShow.test();
        const container = document.getElementById('article-content');
        if (htmlContent) {
            container.innerHTML = `
                <div class="content-wrapper">
                    <h1>${htmlContent.title}</h1>
                    <div class="article-info">
                        by: ${htmlContent.author} —— published: ${htmlContent.pubDate}
                    </div>
                    <div class="article-info">${htmlContent.description}</div>
                    <a href="${htmlContent.link}" target="_blank" class="article-info">原文链接</a>
                    ${htmlContent.contents}
                </div>
            `;
        } else {
            container.innerHTML = '<div class="content-wrapper"><p>文章未找到</p></div>';
        }
    }
</script>
</html>
